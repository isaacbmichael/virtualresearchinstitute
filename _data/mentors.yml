mentor_program:
  page_title: "For Mentors"
  page_intro: "Information for prospective VRI research mentors: compensation, workload, student fit, mentor role, VRI support, and application review."

  inquiry_email: "info@virtualresearchinstitute.org"

  mentor_application_label: "Apply to Mentor with VRI"
  mentor_application_href: "https://lsu.formstack.com/forms/vri_mentor_application"
  mentor_application_target: "_blank"
  mentor_application_rel: "noopener noreferrer"

  mentor_inquiry_label: "Mentor Inquiry"
  mentor_inquiry_href: "mailto:info@virtualresearchinstitute.org"

hero:
  eyebrow: "For Prospective Research Mentors"
  title: "Mentor serious student research with VRI."
  intro: "Virtual Research Institute partners with faculty, postdoctoral scholars, PhD holders, advanced PhD candidates, and highly qualified specialists to guide motivated students through rigorous online research projects."

  primary_cta_label: "Apply to Mentor with VRI"
  primary_cta_href: "https://lsu.formstack.com/forms/vri_mentor_application"
  primary_cta_target: "_blank"
  primary_cta_rel: "noopener noreferrer"

  secondary_cta_label: "View Compensation & Commitment"
  secondary_cta_href: "#compensation"

engagement_model:
  status: "Independent contractor"
  form_1099: true
  agreement_term: "1 year"
  renewal: "Subject to program need, mentor performance, and mutual fit"

  confidentiality_required: true
  nda_required: true
  non_circumvention_required: true
  non_poaching_required: true

  summary: "Mentors generally serve as independent contractors for approved VRI projects unless a separate written agreement states otherwise. Project scope, compensation, communication expectations, and onboarding requirements are confirmed before student work begins."

  important_note: "Approval allows VRI to consider a mentor for suitable projects, cohorts, or mentorship opportunities. It does not guarantee assignment or a minimum amount of work."

mentor_engagements:
  circles:
    label: "Circles"
    compensation_display: "$5,000"
    compensation_basis: "per cohort"

    estimated_duration: "6 weeks"
    estimated_meetings_per_week: "1 live cohort meeting per week"
    estimated_meeting_length: "90 minutes"
    estimated_total_live_meetings: "6"
    estimated_total_hours: "24-35 hours total"

    workload_note: "Includes live sessions, preparation, student feedback, light communication, and final deliverable review."
    availability_note: "Available when VRI approves the project and sufficient enrollment is reached."

  groups:
    label: "Groups"
    compensation_display: "$6,500"
    compensation_basis: "per cohort"

    estimated_duration: "10 weeks"
    estimated_meetings_per_week: "1 live cohort meeting per week"
    estimated_meeting_length: "90 minutes"
    estimated_total_live_meetings: "10"
    estimated_total_hours: "45-65 hours total"

    workload_note: "Includes live sessions, preparation, individualized feedback, project direction, communication, and final deliverable support."
    availability_note: "Available when VRI approves the project and sufficient enrollment is reached."

  private_mentorship:
    label: "Private Mentorship"
    compensation_display: "$3,000 per student"
    compensation_detail: "Available only for approved individualized mentorship cases"
    compensation_basis: "per approved student"

    estimated_duration: "12-16 weeks"
    estimated_meetings_per_week: "Usually 1 live meeting per week"
    estimated_meeting_length: "60-90 minutes"
    estimated_total_live_meetings: "12-16"
    estimated_total_hours: "35-70 hours total, depending on scope"

    workload_note: "Includes live meetings, preparation, individualized feedback, project planning, communication, and final deliverable support."
    availability_note: "Private Mentorship is limited and requires VRI approval."

compensation:
  section_label: "Compensation & Commitment"
  section_title: "Clear expectations before a project begins."
  section_intro: "Mentors should understand the compensation, schedule, student format, and expected commitment before agreeing to lead a VRI project."

  payment_model_note: "Compensation applies to approved VRI work that is assigned and completed. Payment timing and any required documentation are confirmed before the project begins."

  documentation_note: "Mentors may be asked to provide brief session notes, attendance records, feedback, or final materials appropriate to the approved project."

mentor_standards:
  - "Strong preparation in the proposed field"
  - "Ability to guide motivated students through serious research work"
  - "Clear, professional communication"
  - "Dependable preparation and follow-through"
  - "Sound judgment when working with students"
  - "Commitment to academic integrity and appropriate professional boundaries"

screening:
  - "Application or inquiry review"
  - "CV, credential, or professional background review where relevant"
  - "Conversation about subject fit, mentoring approach, and project ideas"
  - "Review of project scope, prerequisites, and expected student outcomes"
  - "Reference or background review where appropriate"
  - "Completion of required onboarding before working with students"

responsibilities:
  - "Prepare for scheduled research meetings"
  - "Lead live online sessions professionally and on time"
  - "Guide students through appropriate research tasks between meetings"
  - "Provide feedback on student progress and final work"
  - "Communicate through VRI-approved channels"
  - "Maintain appropriate professional boundaries with students and families"
  - "Support a final deliverable suited to the approved project scope"

private_mentorship:
  availability: "Limited; by approval"
  continuation_only: true
  summary: "Private Mentorship may be considered for students ready for deeper individualized research work, often after strong prior work in a VRI program."

  important_note: "Private Mentorship is not a standard extension of every Circle or Group. It depends on student readiness, mentor capacity, project fit, and VRI approval."

  review_factors:
    - "Prior student performance"
    - "Student readiness for individualized work"
    - "Mentor recommendation"
    - "Appropriate next-stage project fit"
    - "Mentor availability"
    - "Program capacity"
    - "VRI approval"

mentor_benefits:
  section_label: "Why Mentor with VRI"
  section_title: "Guide serious student research with meaningful support."
  summary: "VRI gives mentors a professional structure for guiding motivated students while the institute supports enrollment, coordination, expectations, and program design."

  points:
    - "Work with motivated students seeking meaningful research experience"
    - "Develop rigorous projects with realistic student outcomes"
    - "Focus on academic mentoring while VRI supports program coordination"
    - "Receive clear expectations for compensation, scheduling, communication, and onboarding"
