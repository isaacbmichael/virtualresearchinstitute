# ============================================================
# VRI session controls
#
# active: true   -> show this session on the website
# active: false  -> hide this session from the website
#
# mode controls page wording only:
#   one_session  -> use wording such as "current session"
#   two_sessions -> use wording such as "Session 1 / Session 2"
#
# The website renders only sessions where active: true.
# ============================================================

calendar_model:
  standard_duration: "6 weeks"
  standard_alignment: "Circles and Groups may share the same six-week session calendar. Research Extensions are considered after a Circle or Group is completed."
  suggested_annual_rhythm: "Spring: 1 session; Summer: 2 sessions; Fall: 1 session"

circles:
  mode: "two_sessions"

  sessions:
    - id: "session-1"
      active: true
      label: "Session 1"
      start_date: "September 14, 2026"
      end_date: "October 24, 2026"
      registration_deadline: "August 31, 2026"
      offerings_count: "4 offerings"
      duration: "6 weeks"
      proposals_data: "circles_session_1"

    - id: "session-2"
      active: true
      label: "Session 2"
      start_date: "November 2, 2026"
      end_date: "December 12, 2026"
      registration_deadline: "October 19, 2026"
      offerings_count: "4 offerings"
      duration: "6 weeks"
      proposals_data: "circles_session_2"

