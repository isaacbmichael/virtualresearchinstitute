# ============================================================
# VRI session controls
#
# MAIN PATHWAY STATUS CONTROL
#
# Each pathway has its own status:
#   circles.status controls the Circles page
#   groups.status  controls the Groups page
#
# Recommended status values:
#   auto       -> safest default. Show active sessions if at least one
#                 session has active: true. If no sessions are active,
#                 automatically show the "in preparation" card.
#   preparing  -> intentionally hide session/project cards and show the
#                 "in preparation" card.
#   closed     -> intentionally hide session/project cards and show the
#                 "not currently accepting registrations" card.
#
# SESSION VISIBILITY CONTROL
#
# active: true   -> this session is eligible to appear when status: auto
# active: false  -> hide this session from the website
#
# Safe behavior to build into the page templates:
# If status: auto but every session is active: false, the page should not
# look empty. It should automatically show the preparing status card.
#
# mode controls page wording only:
#   one_session  -> use wording such as "current session"
#   two_sessions -> use wording such as "Session 1 / Session 2"
#
# The website renders only sessions where active: true.
# ============================================================

calendar_model:
  standard_duration: "6 weeks"
  standard_alignment: "Circles and Groups may share the same six-week session calendar. Research Extensions are considered after a Circle or Group is completed."
  suggested_annual_rhythm: "Spring: 1 session; Summer: 2 sessions; Fall: 1 session"

circles:
  mode: "two_sessions"
  status: "auto"

  status_cards:
    preparing:
      eyebrow: "Circles"
      heading: "Circle projects are in preparation."
      message: "We are currently preparing the next Circle session. New projects will be posted once mentors, schedules, and proposal details are finalized."
      cta_label: "Join the Interest List"
      cta_href: "https://lsu.formstack.com/forms/vri_interest_list"
    closed:
      eyebrow: "Circles"
      heading: "Circle registration is not currently open."
      message: "Circle projects are not currently accepting registrations. Please join the interest list to be notified when the next session opens."
      cta_label: "Join the Interest List"
      cta_href: "https://lsu.formstack.com/forms/vri_interest_list"

  sessions:
    - id: "session-1"
      active: true
      label: "Session 1"
      start_date: "September 14, 2026"
      end_date: "October 24, 2026"
      registration_deadline: "August 31, 2026"
      offerings_count: "4 offerings"
      duration: "6 weeks"
      proposals_data: "circles_session_1"

    - id: "session-2"
      active: true
      label: "Session 2"
      start_date: "November 2, 2026"
      end_date: "December 12, 2026"
      registration_deadline: "October 19, 2026"
      offerings_count: "4 offerings"
      duration: "6 weeks"
      proposals_data: "circles_session_2"

