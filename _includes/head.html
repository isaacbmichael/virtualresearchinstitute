<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page.title | default: site.title }}</title>
<meta
  name="description"
  content="{{ page.description | default: site.description }}"
/>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<noscript>
  <style>
    .menu-toggle,
    .menu-backdrop,
    .mobile-panel {
      display: none !important;
    }

    .noscript-nav {
      padding: 12px 0 0;
    }

    .noscript-nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 0;
      padding: 0 0 18px;
    }

    .noscript-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(4, 76, 89, 0.12);
      box-shadow: var(--shadow-sm);
      color: var(--teal-900);
      font-weight: 700;
    }
  </style>
</noscript>

<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
